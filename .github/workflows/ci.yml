name: CI Practica Profesional ms-mensajeria

on:
  push:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: |
          sed -i 's/\r$//' mvnw || true
          chmod +x mvnw || true
          ./mvnw clean package -DskipTests

      - name: Login Dockerhub
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin

      - name: Build and push Docker image
        run: |
          TAG=$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}
          docker build \
            --label "project=practica-u" \
            --label "service=ms-mensajeria" \
            -t $DOCKER_USERNAME/practica-profesional-mensajeria:$TAG \
            -t $DOCKER_USERNAME/practica-profesional-mensajeria:latest \
            .
          docker push $DOCKER_USERNAME/practica-profesional-mensajeria:$TAG
          docker push $DOCKER_USERNAME/practica-profesional-mensajeria:latest
